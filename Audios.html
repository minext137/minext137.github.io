<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPT8528 - 音频</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: "Noto Sans SC", "微软雅黑", "PingFang SC", sans-serif;
        background: #0b0b1a;
        color: #e8e8f0;
        min-height: 100vh;
        padding: 32px 20px 80px;
        position: relative;
        overflow-x: hidden;
    }

    .bg-blur {
        position: fixed; inset: 0; pointer-events: none;
    }
    .bg-blur div {
        position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12;
        animation: blobFloat 12s ease-in-out infinite alternate;
    }
    .bg-blur div:nth-child(1) {
        width: 400px; height: 400px; background: #fd79a8; top: -10%; left: -5%;
    }
    .bg-blur div:nth-child(2) {
        width: 350px; height: 350px; background: #6c5ce7; bottom: -10%; right: -5%;
        animation-delay: 6s;
    }
    @keyframes blobFloat {
        0% { transform: translate(0,0) scale(1); }
        100% { transform: translate(30px,-30px) scale(1.15); }
    }

    /* 导航 */
    .nav-bar {
        position: fixed; top: 0; left: 0; right: 0;
        z-index: 100;
        display: flex; align-items: center;
        padding: 12px 20px;
        background: rgba(11,11,26,0.6);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .nav-bar a {
        color: rgba(255,255,255,0.35);
        text-decoration: none;
        font-size: 13px; font-weight: 500;
        transition: color 0.2s;
        display: flex; align-items: center; gap: 6px;
    }
    .nav-bar a:hover { color: rgba(255,255,255,0.6); }
    .nav-bar .sep { color: rgba(255,255,255,0.1); margin: 0 10px; }
    .nav-bar .cur {
        font-size: 13px; font-weight: 600;
        background: linear-gradient(135deg, #fd79a8, #a29bfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* 容器 */
    .container {
        position: relative;
        z-index: 10;
        max-width: 640px;
        margin: 50px auto 0;
        animation: fadeUp 0.8s ease-out forwards;
    }
    @keyframes fadeUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    /* 头部 */
    .header { margin-bottom: 28px; }
    .header h1 {
        font-size: 28px; font-weight: 800;
        margin-bottom: 6px;
        background: linear-gradient(135deg, #e8e8f0, #fd79a8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .header p { font-size: 14px; color: rgba(255,255,255,0.3); }

    /* 音轨卡片 */
    .track {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 14px;
        padding: 16px 18px;
        margin-bottom: 12px;
        transition: all 0.3s;
    }
    .track:hover {
        border-color: rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
    }

    .track-top {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 10px;
    }

    .track-num {
        width: 32px; height: 32px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center; justify-content: center;
        font-size: 13px; font-weight: 700;
        color: rgba(255,255,255,0.3);
        flex-shrink: 0;
    }
    .track.playing .track-num {
        background: rgba(162,155,254,0.15);
        border-color: rgba(162,155,254,0.25);
        color: #a29bfe;
    }

    .track-info { flex: 1; min-width: 0; }
    .track-info .name {
        font-size: 16px; font-weight: 600;
    }
    .track-info .meta {
        font-size: 12px;
        color: rgba(255,255,255,0.2);
        margin-top: 1px;
    }

    .track-dl {
        flex-shrink: 0;
        padding: 6px 14px;
        border-radius: 100px;
        font-size: 12px; font-weight: 600;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.04);
        color: rgba(255,255,255,0.35);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.25s;
    }
    .track-dl:hover {
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.6);
        border-color: rgba(255,255,255,0.2);
    }

    /* 自定义音频条 */
    .track-player {
        width: 100%;
        height: 36px;
    }
    .track-player audio {
        width: 100%;
        height: 36px;
        border-radius: 6px;
        outline: none;
    }
    .track-player audio::-webkit-media-controls-panel {
        background: rgba(255,255,255,0.03);
    }
    .track-player audio::-webkit-media-controls-current-time-display,
    .track-player audio::-webkit-media-controls-time-remaining-display {
        color: rgba(255,255,255,0.5);
    }

    /* 全选播放 */
    .play-all {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 24px;
        border-radius: 100px;
        font-size: 14px; font-weight: 600;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
        color: rgba(255,255,255,0.4);
        cursor: pointer;
        transition: all 0.25s;
        margin-bottom: 20px;
    }
    .play-all:hover {
        background: rgba(255,255,255,0.06);
        border-color: rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.6);
    }

    /* 计数 */
    .count-bar {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: rgba(255,255,255,0.12);
    }

    /* 页脚 */
    .footer {
        position: fixed; bottom: 0; left: 0; right: 0;
        z-index: 100;
        text-align: center;
        padding: 10px;
        font-size: 11px;
        color: rgba(255,255,255,0.08);
        background: rgba(11,11,26,0.4);
        backdrop-filter: blur(6px);
        cursor: pointer;
        transition: color 0.3s;
    }
    .footer:hover { color: rgba(255,255,255,0.18); }

    /* 涟漪 */
    #rippleContainer {
        position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    }
    .ripple {
        position: absolute; border-radius: 50%;
        border: 2px solid rgba(162,155,254,0.2);
        transform: translate(-50%,-50%) scale(0);
        animation: rippleAnim 0.8s ease-out forwards;
        pointer-events: none;
    }
    @keyframes rippleAnim {
        to { transform: translate(-50%,-50%) scale(4); opacity: 0; }
    }

    @media (max-width: 500px) {
        body { padding: 24px 14px 70px; }
        .track { padding: 12px 14px; }
        .track-info .name { font-size: 14px; }
        .track-num { width: 28px; height: 28px; font-size: 11px; }
    }
    </style>
</head>
<body>

<div class="bg-blur"><div></div><div></div></div>
<div id="rippleContainer"></div>

<!-- 导航 -->
<div class="nav-bar">
    <a href="./index.html">🏠 首页</a>
    <span class="sep">/</span>
    <span class="cur">音频</span>
</div>

<!-- 主体 -->
<div class="container">
    <div class="header">
        <h1>🎵 音频</h1>
        <p>收集的各种音频资源</p>
    </div>

    <div class="play-all" id="playAllBtn">▶ 全部播放</div>

    <!-- 音轨列表 -->
    <div id="trackList"></div>

    <div class="count-bar" id="countBar"></div>
</div>

<div class="footer" id="footerEl">🎓 桦甸市一中心小学 · 六年二班</div>

<script>
// ===== 音频数据 =====
const TRACKS = [
    { num: 1, name: '我要验牌', file: 'Audio/WoYaoYanPai.m4a', size: '0.5 MB' },
    { num: 2, name: '牌没有问题', file: 'Audio/PaiMeiYouWenTi.m4a', size: '0.4 MB' },
    { num: 3, name: '小瘪三', file: 'Audio/XiaoBieSan.m4a', size: '0.6 MB' },
    { num: 4, name: '给我擦皮鞋', file: 'Audio/GeiWoCaPiXie.m4a', size: '0.7 MB' },
];

const listEl = document.getElementById('trackList');
const audioElements = [];

TRACKS.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'track';
    div.dataset.index = i;

    div.innerHTML = `
        <div class="track-top">
            <div class="track-num">${t.num}</div>
            <div class="track-info">
                <div class="name">${t.name}</div>
                <div class="meta">M4A · ${t.size}</div>
            </div>
            <a class="track-dl" href="${t.file}" download="${t.name}.m4a">下载</a>
        </div>
        <div class="track-player">
            <audio src="${t.file}" controls preload="metadata"></audio>
        </div>
    `;

    listEl.appendChild(div);
    const audio = div.querySelector('audio');
    audioElements.push(audio);

    // 播放时高亮
    audio.addEventListener('play', () => {
        div.classList.add('playing');
    });
    audio.addEventListener('pause', () => {
        div.classList.remove('playing');
    });
    audio.addEventListener('ended', () => {
        div.classList.remove('playing');
    });
});

document.getElementById('countBar').textContent = `共收录 ${TRACKS.length} 条音频`;

// ===== 全部播放 =====
const playAllBtn = document.getElementById('playAllBtn');
let isPlayingAll = false;
let currentPlayIndex = 0;

playAllBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (isPlayingAll) {
        // 停止全部
        audioElements.forEach(a => { a.pause(); a.currentTime = 0; });
        isPlayingAll = false;
        playAllBtn.textContent = '▶ 全部播放';
        return;
    }

    isPlayingAll = true;
    currentPlayIndex = 0;
    playAllBtn.textContent = '⏹ 停止播放';

    function playNext() {
        if (!isPlayingAll || currentPlayIndex >= audioElements.length) {
            isPlayingAll = false;
            playAllBtn.textContent = '▶ 全部播放';
            return;
        }
        // 停止所有
        audioElements.forEach(a => a.pause());
        audioElements[currentPlayIndex].currentTime = 0;
        audioElements[currentPlayIndex].play();

        const cur = currentPlayIndex;
        audioElements[cur].onended = () => {
            if (isPlayingAll) {
                currentPlayIndex++;
                playNext();
            }
        };
    }
    playNext();
});

// 如果手动播放某个音轨，停止全部播放模式
audioElements.forEach((a, i) => {
    a.addEventListener('play', () => {
        if (isPlayingAll && i !== currentPlayIndex) {
            // 用户手动切换了，停止全部播放模式
            isPlayingAll = false;
            playAllBtn.textContent = '▶ 全部播放';
        }
    });
});

// ===== 涟漪 =====
document.addEventListener('click', (e) => {
    const c = document.getElementById('rippleContainer');
    const el = document.createElement('div');
    el.className = 'ripple';
    el.style.left = e.clientX + 'px';
    el.style.top = e.clientY + 'px';
    const size = 20 + Math.random() * 40;
    el.style.width = size + 'px'; el.style.height = size + 'px';
    c.appendChild(el);
    setTimeout(() => el.remove(), 900);
});

// ===== 页脚彩蛋 =====
document.getElementById('footerEl').addEventListener('click', function(e) {
    e.stopPropagation();
    const msgs = ['🎵 听点好的', '🎧 音频收藏', '🔊 音量拉满', '🎓 KUAIDI'];
    const m = msgs[Math.random() * msgs.length | 0];
    const el = document.createElement('div');
    el.style.cssText = `
        position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
        z-index: 9999; font-size: 15px; font-weight: 600;
        color: #fd79a8; pointer-events: none;
        animation: flyUp 2s ease-out forwards;
    `;
    el.textContent = m;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
});

const ss = document.createElement('style');
ss.textContent = `
    @keyframes flyUp {
        0% { opacity: 0; transform: translateX(-50%) translateY(0); }
        20% { opacity: 1; transform: translateX(-50%) translateY(-6px); }
        80% { opacity: 1; transform: translateX(-50%) translateY(-6px); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }
`;
document.head.appendChild(ss);
</script>
</body>
</html>
